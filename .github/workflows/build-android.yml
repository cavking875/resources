name: Build Android APK

on:
  push:
    branches: [ "claude/android-app-dev-1t2859", "main" ]
    paths: [ "android/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle-dist
          echo "/opt/gradle-dist/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Show versions
        run: |
          gradle --version
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BehaviourTracker-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
